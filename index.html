<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ Công Thức</title>
<style>
  :root {
    --primary: #e8654a;
    --primary-light: #fff0ed;
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #2d2d2d;
    --muted: #888;
    --border: #eee;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--primary); color: #fff; padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1.3rem; font-weight: 700; }
  .header p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

  .search-wrap { padding: 14px 16px 8px; }
  .search-wrap input {
    width: 100%; padding: 10px 16px; border-radius: 50px;
    border: 1.5px solid var(--border); font-size: 0.95rem;
    background: #fff; outline: none; transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--primary); }

  .cats { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap; padding: 6px 14px; border-radius: 50px;
    border: 1.5px solid var(--border); background: #fff;
    font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
  }
  .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 100px; }
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer;
    overflow: hidden; transition: transform 0.15s;
  }
  .card:active { transform: scale(0.97); }

  .card-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 3rem; }

  .card-body { padding: 10px 12px 12px; }
  .card-name { font-weight: 700; font-size: 0.9rem; line-height: 1.3; }
  .card-cat { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .card-time { font-size: 0.72rem; color: var(--primary); margin-top: 4px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: span 2; }
  .empty div { font-size: 3rem; margin-bottom: 10px; }

  .fab {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--primary); color: #fff;
    width: 56px; height: 56px; border-radius: 50%;
    font-size: 1.8rem; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,101,74,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 300;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: #fff; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; max-height: 92vh;
    overflow-y: auto; padding: 0 0 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 4px; margin: 12px auto 0; }

  /* View hero image */
  .view-hero {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; margin-top: 8px;
  }
  .view-hero img { width: 100%; height: 100%; object-fit: cover; }
  .view-hero-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 4rem; }

  .sheet-header { padding: 14px 20px 0; display: flex; align-items: flex-start; gap: 10px; }
  .sheet-title { font-size: 1.15rem; font-weight: 700; flex: 1; }
  .sheet-close { background: #f3f3f3; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; flex-shrink: 0; }

  .sheet-meta { display: flex; gap: 16px; padding: 10px 20px 0; }
  .meta-item { font-size: 0.78rem; color: var(--muted); }
  .meta-item span { color: var(--primary); font-weight: 600; }

  .section { padding: 16px 20px 0; }
  .section h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
  .ingredient-list { list-style: none; }
  .ingredient-list li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; display: flex; gap: 8px; }
  .ingredient-list li::before { content: "•"; color: var(--primary); font-weight: 700; }
  .steps-list { list-style: none; counter-reset: step; }
  .steps-list li { counter-increment: step; padding: 8px 0 8px 36px; border-bottom: 1px solid var(--border); font-size: 0.92rem; position: relative; line-height: 1.5; }
  .steps-list li::before {
    content: counter(step); position: absolute; left: 0;
    background: var(--primary); color: #fff;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; top: 8px;
  }
  .note-box { background: #fffbe6; border-left: 3px solid #f5c842; border-radius: 8px; padding: 12px; font-size: 0.88rem; line-height: 1.5; }
  .sheet-actions { display: flex; gap: 10px; padding: 20px 20px 0; }
  .btn-edit, .btn-del { flex: 1; padding: 11px; border-radius: 12px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-edit { background: var(--primary-light); color: var(--primary); }
  .btn-del { background: #fff0f0; color: #d63031; }

  /* Image upload area */
  .img-upload-area {
    margin: 0 20px 12px;
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 16px; text-align: center; cursor: pointer;
    transition: border-color 0.2s; position: relative; overflow: hidden;
  }
  .img-upload-area:hover { border-color: var(--primary); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; display: none; }
  .img-upload-hint { color: var(--muted); font-size: 0.85rem; }
  .img-upload-hint span { font-size: 1.8rem; display: block; margin-bottom: 4px; }

  .form-group { padding: 0 20px 12px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1.5px solid var(--border); font-size: 0.92rem;
    font-family: inherit; outline: none; background: #fafafa;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: flex; gap: 10px; padding: 0 20px 12px; }
  .form-row .form-group { padding: 0; flex: 1; }
  .btn-save {
    margin: 8px 20px 0; width: calc(100% - 40px);
    padding: 13px; background: var(--primary); color: #fff;
    border: none; border-radius: 12px; font-size: 1rem;
    font-weight: 700; cursor: pointer;
  }
  .form-title { padding: 16px 20px 12px; font-size: 1.1rem; font-weight: 700; }
  .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .label-row { display: flex; justify-content: space-between; align-items: center; }
  .btn-rm-img { font-size: 0.75rem; color: #d63031; background: none; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>🍳 Sổ Công Thức</h1>
  <p>Lưu lại kinh nghiệm nấu ăn của bạn</p>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍 Tìm món ăn..." oninput="render()">
</div>

<div class="cats" id="cats"></div>
<div class="grid" id="grid"></div>
<button class="fab" onclick="openForm()">＋</button>

<!-- VIEW MODAL -->
<div class="overlay" id="viewOverlay" onclick="closeView(event)">
  <div class="sheet" id="viewSheet">
    <div class="sheet-handle"></div>
    <div id="vHero"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="vName"></div>
      <button class="sheet-close" onclick="closeOverlay('viewOverlay')">✕</button>
    </div>
    <div class="sheet-meta">
      <div class="meta-item">⏱ <span id="vTime"></span></div>
      <div class="meta-item">🏷 <span id="vCat"></span></div>
    </div>
    <div class="section"><h3>Nguyên liệu</h3><ul class="ingredient-list" id="vIngredients"></ul></div>
    <div class="section"><h3>Cách làm</h3><ol class="steps-list" id="vSteps"></ol></div>
    <div class="section" id="vNoteSection"><h3>Ghi chú</h3><div class="note-box" id="vNote"></div></div>
    <div class="sheet-actions">
      <button class="btn-edit" onclick="editCurrent()">✏️ Sửa</button>
      <button class="btn-del" onclick="deleteCurrent()">🗑 Xóa</button>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="overlay" id="formOverlay" onclick="closeForm(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;padding:14px 20px 8px;">
      <div class="form-title" id="formTitle" style="padding:0;flex:1"></div>
      <button class="sheet-close" onclick="closeOverlay('formOverlay')">✕</button>
    </div>

    <!-- Image upload -->
    <div class="form-group" style="padding:0 20px 4px;">
      <div class="label-row">
        <label>Ảnh món ăn</label>
        <button class="btn-rm-img" id="btnRmImg" onclick="removeImg()" style="display:none">✕ Xóa ảnh</button>
      </div>
    </div>
    <div class="img-upload-area" id="uploadArea" onclick="triggerUpload()">
      <input type="file" id="fImgFile" accept="image/*" onchange="handleImg(event)">
      <img id="imgPreview" class="img-preview">
      <div class="img-upload-hint" id="uploadHint">
        <span>📷</span>
        Bấm để chọn ảnh từ máy / điện thoại
      </div>
    </div>

    <div class="form-group">
      <label>Tên món ăn *</label>
      <input type="text" id="fName" placeholder="VD: Phở bò">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Danh mục</label>
        <select id="fCat">
          <option>Món chính</option><option>Món phụ</option><option>Canh</option>
          <option>Tráng miệng</option><option>Đồ uống</option><option>Ăn sáng</option><option>Khác</option>
        </select>
      </div>
      <div class="form-group">
        <label>Thời gian</label>
        <input type="text" id="fTime" placeholder="30 phút">
      </div>
    </div>
    <div class="form-group">
      <label>Nguyên liệu *</label>
      <textarea id="fIngredients" placeholder="Mỗi nguyên liệu một dòng&#10;VD: 500g thịt bò&#10;2 củ hành tây"></textarea>
      <div class="hint">Mỗi nguyên liệu một dòng</div>
    </div>
    <div class="form-group">
      <label>Cách làm *</label>
      <textarea id="fSteps" placeholder="Mỗi bước một dòng" style="min-height:100px"></textarea>
      <div class="hint">Mỗi bước một dòng</div>
    </div>
    <div class="form-group">
      <label>Ghi chú (tuỳ chọn)</label>
      <textarea id="fNote" placeholder="Mẹo, biến tấu, kinh nghiệm..."></textarea>
    </div>
    <button class="btn-save" onclick="saveRecipe()">💾 Lưu công thức</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'recipes_v2';
let recipes = [], currentId = null, editId = null, pendingImgB64 = null;

const CATS = ['Tất cả','Món chính','Món phụ','Canh','Tráng miệng','Đồ uống','Ăn sáng','Khác'];
let activeCat = 'Tất cả';

const SAMPLES = [
  { id:'s1', img:null, emoji:'🍜', name:'Phở bò', cat:'Món chính', time:'2 giờ',
    ingredients:['500g xương bò','300g thịt bò tái','1 củ hành tây nướng','1 nhánh gừng nướng','Bánh phở tươi','Gia vị: muối, nước mắm, đường phèn','Rau thơm, giá đỗ, chanh, ớt'],
    steps:['Nướng hành tây và gừng trên lửa đến khi cháy xém','Hầm xương bò 3 lít nước, hớt bọt trong 1.5 giờ','Cho hành gừng vào, nêm gia vị','Trụng bánh phở, xếp tô','Thái thịt mỏng xếp lên, chan nước dùng nóng','Ăn kèm rau thơm, giá, chanh, ớt'],
    note:'Hầm lửa nhỏ và hớt bọt liên tục để nước trong. Thêm hoa hồi, quế sẽ thơm hơn.' },
  { id:'s2', img:null, emoji:'🥗', name:'Gỏi cuốn tôm thịt', cat:'Món phụ', time:'30 phút',
    ingredients:['200g tôm luộc','150g thịt heo luộc','Bánh tráng cuốn','Bún tươi','Xà lách, húng quế','Dưa leo thái sợi'],
    steps:['Luộc tôm và thịt, để nguội rồi thái mỏng','Bánh tráng nhúng nước mềm, trải phẳng','Xếp rau, bún, tôm, thịt lên bánh tráng','Cuộn chặt, gấp mép hai đầu','Pha nước chấm: tương hoisin + đậu phộng rang'],
    note:'Nhúng bánh tráng nhanh tay, không để quá mềm sẽ bị rách.' }
];

function load() {
  try { recipes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { recipes = []; }
  if (!recipes.length) { recipes = SAMPLES; save(); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes)); }

function imgEl(r, cls) {
  if (r.img) return `<img src="${r.img}" class="${cls}" style="width:100%;height:100%;object-fit:cover;">`;
  return `<div style="font-size:3rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${r.emoji||'🍽️'}</div>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = recipes.filter(r =>
    (activeCat==='Tất cả' || r.cat===activeCat) &&
    (!q || r.name.toLowerCase().includes(q))
  );
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div class="empty"><div>🍽️</div><p>Chưa có món nào</p></div>`; return;
  }
  g.innerHTML = list.map(r => `
    <div class="card" onclick="viewRecipe('${r.id}')">
      <div style="width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--primary-light);">
        ${imgEl(r, 'card-img-tag')}
      </div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-cat">${r.cat}</div>
        ${r.time ? `<div class="card-time">⏱ ${r.time}</div>` : ''}
      </div>
    </div>`).join('');
}

function renderCats() {
  document.getElementById('cats').innerHTML = CATS.map(c =>
    `<button class="cat-btn ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(c) { activeCat = c; renderCats(); render(); }

function viewRecipe(id) {
  const r = recipes.find(x => x.id===id); if (!r) return;
  currentId = id;
  // hero
  const hero = document.getElementById('vHero');
  if (r.img) {
    hero.innerHTML = `<div style="width:100%;aspect-ratio:16/9;overflow:hidden;"><img src="${r.img}" style="width:100%;height:100%;object-fit:cover;"></div>`;
  } else {
    hero.innerHTML = `<div style="width:100%;aspect-ratio:16/9;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:4rem;">${r.emoji||'🍽️'}</div>`;
  }
  document.getElementById('vName').textContent = r.name;
  document.getElementById('vTime').textContent = r.time||'—';
  document.getElementById('vCat').textContent = r.cat;
  document.getElementById('vIngredients').innerHTML = r.ingredients.map(i=>`<li>${i}</li>`).join('');
  document.getElementById('vSteps').innerHTML = r.steps.map(s=>`<li>${s}</li>`).join('');
  const ns = document.getElementById('vNoteSection');
  if (r.note) { document.getElementById('vNote').textContent = r.note; ns.style.display=''; }
  else ns.style.display='none';
  document.getElementById('viewOverlay').classList.add('open');
}

function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function closeView(e) { if (e.target.id==='viewOverlay') closeOverlay('viewOverlay'); }
function closeForm(e) { if (e.target.id==='formOverlay') closeOverlay('formOverlay'); }

// --- Image handling ---
function triggerUpload() { document.getElementById('fImgFile').click(); }

function handleImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImgB64 = ev.target.result;
    showPreview(pendingImgB64);
  };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  const prev = document.getElementById('imgPreview');
  const hint = document.getElementById('uploadHint');
  const btnRm = document.getElementById('btnRmImg');
  prev.src = src; prev.style.display = 'block';
  hint.style.display = 'none';
  btnRm.style.display = 'inline';
}

function removeImg() {
  pendingImgB64 = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPreview').src = '';
  document.getElementById('uploadHint').style.display = 'block';
  document.getElementById('btnRmImg').style.display = 'none';
  document.getElementById('fImgFile').value = '';
}

function openForm(id=null) {
  editId = id; pendingImgB64 = null;
  document.getElementById('formTitle').textContent = id ? '✏️ Sửa công thức' : '➕ Thêm món mới';
  const r = id ? recipes.find(x=>x.id===id) : null;
  document.getElementById('fName').value = r ? r.name : '';
  document.getElementById('fCat').value = r ? r.cat : 'Món chính';
  document.getElementById('fTime').value = r ? r.time : '';
  document.getElementById('fIngredients').value = r ? r.ingredients.join('\n') : '';
  document.getElementById('fSteps').value = r ? r.steps.join('\n') : '';
  document.getElementById('fNote').value = r ? (r.note||'') : '';
  document.getElementById('fImgFile').value = '';
  // show existing image
  if (r && r.img) { pendingImgB64 = r.img; showPreview(r.img); }
  else removeImg();
  document.getElementById('formOverlay').classList.add('open');
}

function editCurrent() { closeOverlay('viewOverlay'); openForm(currentId); }

function deleteCurrent() {
  if (!confirm('Xóa món này?')) return;
  recipes = recipes.filter(r=>r.id!==currentId);
  save(); render(); closeOverlay('viewOverlay');
}

function saveRecipe() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Vui lòng nhập tên món ăn!'); return; }
  const ingredients = document.getElementById('fIngredients').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const steps = document.getElementById('fSteps').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!ingredients.length) { alert('Vui lòng nhập nguyên liệu!'); return; }
  if (!steps.length) { alert('Vui lòng nhập cách làm!'); return; }
  const data = {
    id: editId||('r'+Date.now()),
    img: pendingImgB64 || null,
    emoji: '🍽️',
    name, cat: document.getElementById('fCat').value,
    time: document.getElementById('fTime').value.trim(),
    ingredients, steps,
    note: document.getElementById('fNote').value.trim()
  };
  if (editId) { const i = recipes.findIndex(r=>r.id===editId); recipes[i]=data; }
  else recipes.unshift(data);
  save(); render(); closeOverlay('formOverlay');
}

load(); renderCats(); render();
</script>
</body>
</html>

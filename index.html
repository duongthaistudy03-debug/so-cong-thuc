<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ Công Thức</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#faf7f2;
  color:#2d2d2d;
}
header{
  background:#e8654a;
  color:white;
  padding:18px;
  text-align:center;
}
header h1{
  margin:0;
}
#status{
  margin-top:6px;
  font-size:14px;
}
main{
  max-width:900px;
  margin:auto;
  padding:16px;
}
.box{
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  margin-bottom:20px;
}
input,select,textarea{
  width:100%;
  box-sizing:border-box;
  padding:11px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:15px;
}
textarea{
  min-height:80px;
}
button{
  border:0;
  background:#e8654a;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
button.gray{
  background:#777;
}
button.red{
  background:#d63031;
}
button.blue{
  background:#0984e3;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
}
.card{
  background:white;
  padding:14px;
  border-radius:16px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
.card h3{
  margin:0 0 6px;
}
.card small{
  color:#777;
}
.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.hidden{
  display:none!important;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.modal-content{
  background:white;
  width:100%;
  max-width:520px;
  max-height:85vh;
  overflow:auto;
  border-radius:18px;
  padding:20px;
  position:relative;
}
.close{
  position:absolute;
  right:12px;
  top:12px;
  background:#999;
}
ul,ol{
  padding-left:22px;
}
</style>
</head>

<body>

<header>
  <h1>🍳 Sổ Công Thức</h1>
  <p>GitHub Pages + JSONBin</p>
  <div id="status">Đang tải dữ liệu...</div>
</header>

<main>
  <section class="box">
    <h2 id="formTitle">Thêm món mới</h2>

    <input id="name" placeholder="Tên món ăn">

    <select id="cat">
      <option>Món chính</option>
      <option>Món phụ</option>
      <option>Canh</option>
      <option>Tráng miệng</option>
      <option>Đồ uống</option>
      <option>Ăn sáng</option>
      <option>Khác</option>
    </select>

    <input id="time" placeholder="Thời gian nấu, ví dụ: 30 phút">

    <textarea id="ingredients" placeholder="Nguyên liệu, mỗi dòng một nguyên liệu"></textarea>

    <textarea id="steps" placeholder="Cách làm, mỗi dòng một bước"></textarea>

    <textarea id="note" placeholder="Ghi chú"></textarea>

    <input id="tiktok" placeholder="Link TikTok nếu có">

    <div class="actions">
      <button onclick="saveRecipe()" id="saveBtn">💾 Lưu công thức</button>
      <button onclick="cancelEdit()" id="cancelBtn" class="gray hidden">Hủy sửa</button>
    </div>
  </section>

  <section>
    <h2>Danh sách món ăn</h2>
    <input id="search" placeholder="🔍 Tìm món ăn..." oninput="render()">
    <div id="list" class="grid"></div>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">×</button>
    <div id="detail"></div>
  </div>
</div>

<script>
const BIN_ID = "6a1300736877513b27c573c3";
const API_KEY = "$2a$10$NHGUMMCjo/r18txeFCVRQuY6DLtyUE0SmgDT1eQcV03xuCMw/c.Ie";

const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
let recipes = [];
let editingId = null;

const statusEl = document.getElementById("status");
const listEl = document.getElementById("list");

function headers(){
  return {
    "Content-Type":"application/json",
    "X-Master-Key":API_KEY
  };
}

async function loadRecipes(){
  try{
    statusEl.textContent = "Đang tải từ JSONBin...";

    const res = await fetch(`${URL}/latest`, {
      method:"GET",
      headers:headers()
    });

    if(!res.ok) throw new Error("Không đọc được JSONBin");

    const data = await res.json();
    recipes = data.record.recipes || [];

    render();
    statusEl.textContent = "✅ Đã đồng bộ JSONBin";
  }catch(err){
    console.error(err);
    statusEl.textContent = "❌ Lỗi tải dữ liệu";
    listEl.innerHTML = "<p>Kiểm tra lại BIN_ID hoặc API_KEY.</p>";
  }
}

async function uploadRecipes(){
  try{
    statusEl.textContent = "Đang lưu lên JSONBin...";

    const res = await fetch(URL, {
      method:"PUT",
      headers:headers(),
      body:JSON.stringify({ recipes })
    });

    if(!res.ok) throw new Error("Không lưu được JSONBin");

    statusEl.textContent = "✅ Đã lưu thành công";
  }catch(err){
    console.error(err);
    statusEl.textContent = "❌ Lỗi lưu dữ liệu";
    alert("Không lưu được. Kiểm tra API Key hoặc Bin ID.");
  }
}

async function saveRecipe(){
  const name = document.getElementById("name").value.trim();
  const cat = document.getElementById("cat").value;
  const time = document.getElementById("time").value.trim();
  const note = document.getElementById("note").value.trim();
  const tiktok = document.getElementById("tiktok").value.trim();

  const ingredients = document.getElementById("ingredients").value
    .split("\n")
    .map(x=>x.trim())
    .filter(Boolean);

  const steps = document.getElementById("steps").value
    .split("\n")
    .map(x=>x.trim())
    .filter(Boolean);

  if(!name){
    alert("Bạn chưa nhập tên món.");
    return;
  }

  if(ingredients.length === 0){
    alert("Bạn chưa nhập nguyên liệu.");
    return;
  }

  if(steps.length === 0){
    alert("Bạn chưa nhập cách làm.");
    return;
  }

  const item = {
    id: editingId || "r" + Date.now(),
    name,
    cat,
    time,
    ingredients,
    steps,
    note,
    tiktok
  };

  if(editingId){
    recipes = recipes.map(r => r.id === editingId ? item : r);
  }else{
    recipes.unshift(item);
  }

  await uploadRecipes();
  clearForm();
  render();
}

function render(){
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = recipes.filter(r =>
    r.name.toLowerCase().includes(keyword)
  );

  if(filtered.length === 0){
    listEl.innerHTML = "<p>Chưa có món nào.</p>";
    return;
  }

  listEl.innerHTML = "";

  filtered.forEach(r=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${safe(r.name)}</h3>
      <small>${safe(r.cat || "Khác")}</small>
      <p>⏱ ${safe(r.time || "Không ghi")}</p>
      <div class="actions">
        <button onclick="viewRecipe('${r.id}')">Xem</button>
        <button class="blue" onclick="editRecipe('${r.id}')">Sửa</button>
        <button class="red" onclick="deleteRecipe('${r.id}')">Xóa</button>
      </div>
    `;

    listEl.appendChild(div);
  });
}

function viewRecipe(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;

  document.getElementById("detail").innerHTML = `
    <h2>${safe(r.name)}</h2>
    <p><b>Danh mục:</b> ${safe(r.cat)}</p>
    <p><b>Thời gian:</b> ${safe(r.time || "Không ghi")}</p>

    <h3>Nguyên liệu</h3>
    <ul>${(r.ingredients||[]).map(x=>`<li>${safe(x)}</li>`).join("")}</ul>

    <h3>Cách làm</h3>
    <ol>${(r.steps||[]).map(x=>`<li>${safe(x)}</li>`).join("")}</ol>

    ${r.note ? `<h3>Ghi chú</h3><p>${safe(r.note)}</p>` : ""}

    ${r.tiktok ? `<h3>TikTok</h3><p><a href="${safe(r.tiktok)}" target="_blank">Mở video</a></p>` : ""}
  `;

  document.getElementById("modal").classList.remove("hidden");
}

function editRecipe(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;

  editingId = id;

  document.getElementById("formTitle").textContent = "Sửa công thức";
  document.getElementById("saveBtn").textContent = "💾 Cập nhật";
  document.getElementById("cancelBtn").classList.remove("hidden");

  document.getElementById("name").value = r.name || "";
  document.getElementById("cat").value = r.cat || "Món chính";
  document.getElementById("time").value = r.time || "";
  document.getElementById("ingredients").value = (r.ingredients||[]).join("\n");
  document.getElementById("steps").value = (r.steps||[]).join("\n");
  document.getElementById("note").value = r.note || "";
  document.getElementById("tiktok").value = r.tiktok || "";

  window.scrollTo({top:0, behavior:"smooth"});
}

async function deleteRecipe(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;

  if(!confirm(`Xóa món "${r.name}" không?`)) return;

  recipes = recipes.filter(x=>x.id!==id);
  await uploadRecipes();
  render();
}

function cancelEdit(){
  clearForm();
}

function clearForm(){
  editingId = null;

  document.getElementById("formTitle").textContent = "Thêm món mới";
  document.getElementById("saveBtn").textContent = "💾 Lưu công thức";
  document.getElementById("cancelBtn").classList.add("hidden");

  document.getElementById("name").value = "";
  document.getElementById("cat").value = "Món chính";
  document.getElementById("time").value = "";
  document.getElementById("ingredients").value = "";
  document.getElementById("steps").value = "";
  document.getElementById("note").value = "";
  document.getElementById("tiktok").value = "";
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function safe(text){
  return String(text || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadRecipes();
</script>

</body>
</html>
